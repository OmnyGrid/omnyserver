<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>OmnyServer — Fleet</title>
    <meta name="description" content="Dashboard for an OmnyServer Hub." />

    <!-- Set pre-paint by boot.js, then kept in step with the in-app theme. -->
    <meta id="theme-color" name="theme-color" content="#0f1318" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="icons/favicon.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="icons/icon-192.png"
    />

    <!-- Shared with OmnyShell Web; installed by `dart run omnyshell_web:copy_assets`. -->
    <link rel="stylesheet" href="kit.css" />
    <link rel="stylesheet" href="terminal.css" />
    <link rel="stylesheet" href="vendor/xterm/xterm.min.css" />
    <link rel="stylesheet" href="app.css" />

    <script src="vendor/xterm/xterm.min.js" defer></script>
    <script src="vendor/xterm/addon-fit.min.js" defer></script>
    <script src="boot.js"></script>
    <script defer src="main.dart.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="toasts"></div>
  </body>
</html>
