name: omnyserver
description: >-
  Distributed server orchestration platform written in pure Dart. A central Hub
  manages a fleet of Node agents over WebSocket-on-TLS: live monitoring,
  capability detection, presets, formulas and desired-state reconciliation,
  exposed both as first-class Dart APIs and a REST HTTP API. Ships Hub, Node and
  CLI implementations.
version: 0.15.1
repository: https://github.com/OmnyGrid/omnyserver

environment:
  sdk: ^3.12.0

executables:
  omnyserver: omnyserver

dependencies:
  args: ^2.7.0
  cryptography: ^2.9.0
  dart_service_manager: ^1.3.1
  meta: ^1.19.0
  omnyhub: ^1.6.0
  omnyshell: ^1.56.1
  path: ^1.9.1
  sqlite3: ^2.9.4
  uuid: ^4.5.3
  # The browser half of the API transport seam (`fetch`), so a web dashboard can
  # call the Hub. Reached only through a conditional import, so it never enters a
  # native build's graph.
  web: ^1.1.1

dev_dependencies:
  dependency_validator: ^5.0.5
  lints: ^6.1.0
  test: ^1.31.1
