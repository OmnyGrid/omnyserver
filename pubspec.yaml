name: omnyserver
description: >-
  Distributed server orchestration platform written in pure Dart. A central Hub
  manages a fleet of Node agents over WebSocket-on-TLS: live monitoring,
  capability detection, presets, formulas and desired-state reconciliation,
  exposed both as first-class Dart APIs and a REST HTTP API. Ships Hub, Node and
  CLI implementations.
version: 0.3.0
repository: https://github.com/OmnyGrid/omnyserver

environment:
  sdk: ^3.12.0

executables:
  omnyserver: omnyserver

dependencies:
  args: ^2.7.0
  cryptography: ^2.9.0
  dart_service_manager: ^1.3.1
  meta: ^1.18.3
  omnyhub: ^1.3.0
  omnyshell: ^1.56.0
  path: ^1.9.0
  sqlite3: ^2.7.0
  uuid: ^4.5.3

dev_dependencies:
  dependency_validator: ^5.0.5
  lints: ^6.1.0
  test: ^1.31.1

# TEMPORARY — remove once omnyshell 1.56.0 is published (PR #112).
dependency_overrides:
  omnyshell:
    path: ../omnyshell
