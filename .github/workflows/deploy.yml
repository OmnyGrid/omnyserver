name: Deploy the dashboard to GitHub Pages

# Deploys `omnyserver_web/` to https://omnygrid.github.io/omnyserver/.
#
# The github-pages environment only permits deploys from the master branch (not
# release tags), so we deploy from master rather than the release tag. To keep
# deploys release-gated (not on every merge), the `gate` job only proceeds when
# the *dashboard's* pubspec version changed in the push — i.e. a dashboard
# release bump landed — or when the workflow is run manually. A server-only
# release rebuilds nothing.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer deploy supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        name: Deploy only on a dashboard version bump (or manual run)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — deploying."
          elif git diff HEAD^ HEAD -- omnyserver_web/pubspec.yaml | grep -qE '^\+version:'; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Dashboard version bump detected — deploying."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No dashboard version bump — skipping deploy."
          fi

  build:
    needs: gate
    if: needs.gate.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omnyserver_web
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      # The deployed dashboard talks to the API in this repo, so it is built
      # against that one — not against whatever omnyserver was last published.
      - name: Resolve omnyserver from this checkout
        run: |
          printf 'dependency_overrides:\n  omnyserver:\n    path: ..\n' \
            > pubspec_overrides.yaml
      - name: Install dependencies
        run: dart pub get
      - name: Build (dart2js, release)
        run: dart run build_runner build --release --output build
      # dart2js silently skips an entrypoint whose transitive graph imports an
      # unsupported SDK library, emitting no JS. Never deploy that blank page.
      - name: Verify the dart2js bundle was produced
        run: |
          f=build/web/main.dart.js
          test -f "$f" || { echo "::error::dart2js produced no $f — the entrypoint was silently skipped"; exit 1; }
          size=$(wc -c < "$f")
          echo "main.dart.js: $size bytes"
          [ "$size" -gt 100000 ] || { echo "::error::$f is only $size bytes — suspiciously small for a release build"; exit 1; }

      # The strict CSP is injected into the *built* index.html only — not the
      # source — so `webdev serve` (DDC, which needs 'unsafe-eval') keeps working
      # in development while the deployed dart2js build runs under a strict
      # policy: no inline scripts, no third-party origins, xterm self-hosted.
      #
      # `connect-src` is the exception. The Hub is not this origin: its URL is
      # typed at login and its certificate is the operator's own, so the
      # dashboard must be free to call any HTTPS host (REST + the SSE stream) and
      # open a WebSocket to it (the node shell). Narrowing this to 'self' would
      # let the app load and then fail on every request it makes.
      #
      # `frame-ancestors` is deliberately absent: it is only honoured in a real
      # HTTP header, never in a <meta> tag, and GitHub Pages does not let us set
      # headers. Including it bought no clickjacking protection and cost a
      # console error on every page load.
      - name: Inject Content-Security-Policy
        run: |
          python3 - <<'PY'
          import pathlib
          csp = (
              "default-src 'self'; base-uri 'self'; object-src 'none'; "
              "script-src 'self'; "
              "style-src 'self' 'unsafe-inline'; img-src 'self' data:; "
              "font-src 'self'; connect-src 'self' https: wss:; "
              "manifest-src 'self'; worker-src 'self'"
          )
          tag = '<meta http-equiv="Content-Security-Policy" content="%s">' % csp
          p = pathlib.Path("build/web/index.html")
          html = p.read_text()
          assert "<head>" in html, "no <head> in built index.html"
          assert "cdn.jsdelivr.net" not in html, "unexpected CDN reference"
          p.write_text(html.replace("<head>", "<head>\n    " + tag, 1))
          print("CSP injected")
          PY

      # GitHub Pages runs Jekyll by default, which drops files; disable it so the
      # build is served byte-for-byte.
      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: omnyserver_web/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
